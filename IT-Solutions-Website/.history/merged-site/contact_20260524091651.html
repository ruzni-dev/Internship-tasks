<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — NexusForge AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/theme.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg fixed-top" id="mainNav"><div class="container"><a class="navbar-brand" href="index.html"><div class="brand-mark"><i class="bi bi-cpu-fill"></i></div><span>NexusForge AI</span></a><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="navContent"><ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-1"><li class="nav-item"><a class="nav-link" href="index.html">Home</a></li><li class="nav-item"><a class="nav-link" href="about.html">About</a></li><li class="nav-item"><a class="nav-link" href="services.html">Services</a></li><li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li></ul></div></div></nav>

  <section class="page-section dark-page" id="contact">
    <div class="container">
      <div class="row g-5 align-items-start">
        <div class="col-lg-5">
          <span class="section-eyebrow">Get In Touch</span>
          <h2 class="section-title">Let's build <span class="accent">something remarkable</span></h2>
          <p class="section-subtitle mb-4">Ready to transform your business with AI-powered IT solutions? Our team is standing by.</p>
          <div class="d-flex gap-2"><a href="#" class="social-link-premium"><i class="bi bi-linkedin"></i></a><a href="#" class="social-link-premium"><i class="bi bi-twitter-x"></i></a></div>
        </div>
        <div class="col-lg-7">
          <div class="contact-form-premium">
            <form id="premiumContactForm">
              <div class="row g-3">
                <div class="col-md-6"><label class="form-label-premium">Full Name</label><input type="text" class="form-control form-control-premium" placeholder="Your name" required></div>
                <div class="col-md-6"><label class="form-label-premium">Company Email</label><input type="email" class="form-control form-control-premium" placeholder="email@company.com" required></div>
                <div class="col-12"><label class="form-label-premium">Project Brief</label><textarea class="form-control form-control-premium" rows="4" placeholder="Tell us about your project..." required></textarea></div>
                <div class="col-12"><button type="submit" class="btn-gold w-100"><i class="bi bi-send-fill me-2"></i>Send Inquiry</button></div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
