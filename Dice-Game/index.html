<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A premium, interactive 3D Dice Game featuring real-time CSS 3D physics simulation, Web Audio sound effects, CPU mode, and customizable neon themes.">
  <title>Dice Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <!-- Canvas for Confetti particle animation -->
  <canvas id="confetti-canvas"></canvas>

  <div class="game-wrapper">
    <!-- Main Glass Card Container -->
    <main class="game-card">
      
      <!-- Top header bar containing logo, settings toggle, sound, reset -->
      <header class="game-header">
        <div class="logo-area">
          <span class="logo-icon">🎲</span>
          <h1 class="logo-text">DICE <span class="accent-text">ROYALE</span></h1>
        </div>
        
        <div class="quick-controls">
          <button id="sound-btn" class="icon-btn" title="Toggle Sound" aria-label="Toggle Sound">
            <svg id="sound-on-icon" class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
            </svg>
            <svg id="sound-off-icon" class="btn-icon hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              <line x1="23" y1="9" x2="17" y2="15"></line>
              <line x1="17" y1="9" x2="23" y2="15"></line>
            </svg>
          </button>
          
          <button id="reset-btn" class="icon-btn" title="Reset Game" aria-label="Reset Game">
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
            </svg>
          </button>

          <button id="settings-btn" class="icon-btn" title="Game Settings" aria-label="Game Settings">
            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>
      </header>

      <!-- Settings panel - Hidden by default, toggles open -->
      <section id="settings-panel" class="settings-panel hidden">
        <div class="settings-grid">
          <div class="settings-control">
            <label for="mode-select" class="control-label">Game Mode</label>
            <div class="select-wrapper">
              <select id="mode-select">
                <option value="1v1">Player vs Player</option>
                <option value="vs-cpu">Player vs CPU (AI)</option>
              </select>
            </div>
          </div>
          
          <div class="settings-control">
            <label for="target-score" class="control-label">Target Score</label>
            <div class="select-wrapper">
              <select id="target-score">
                <option value="3">First to 3</option>
                <option value="5" selected>First to 5</option>
                <option value="10">First to 10</option>
                <option value="999">Endless Mode</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      <!-- Scoreboard overview banner -->
      <section class="scoreboard-summary">
        <div class="score-pill">
          <span class="pill-label">Target</span>
          <span id="target-score-display" class="pill-value">5 Wins</span>
        </div>
      </section>

      <!-- Interactive Arena: Holds the two player cards -->
      <section class="game-arena">
        
        <!-- Player 1 Card -->
        <article class="player-card" id="player1-card">
          <div class="player-info">
            <div class="player-name-wrapper">
              <span id="p1-name" class="player-name" contenteditable="true" spellcheck="false" title="Double click to edit">Player 1</span>
              <button class="edit-name-btn" aria-label="Edit Player 1 Name">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path>
                </svg>
              </button>
            </div>
            <div id="p1-score-bubble" class="score-bubble">0</div>
          </div>
          
          <!-- 3D Dice Stage -->
          <div class="dice-stage">
            <div class="dice-shadow" id="dice-shadow-1"></div>
            <div class="dice-cube" id="dice-cube-1">
              <!-- Face 1 (Front - 1 Dot) -->
              <div class="dice-face face-front" data-value="1">
                <span class="dot middle"></span>
              </div>
              <!-- Face 6 (Back - 6 Dots) -->
              <div class="dice-face face-back" data-value="6">
                <span class="dot top-left"></span>
                <span class="dot top-right"></span>
                <span class="dot middle-left"></span>
                <span class="dot middle-right"></span>
                <span class="dot bottom-left"></span>
                <span class="dot bottom-right"></span>
              </div>
              <!-- Face 3 (Right - 3 Dots) -->
              <div class="dice-face face-right" data-value="3">
                <span class="dot top-right"></span>
                <span class="dot middle"></span>
                <span class="dot bottom-left"></span>
              </div>
              <!-- Face 4 (Left - 4 Dots) -->
              <div class="dice-face face-left" data-value="4">
                <span class="dot top-left"></span>
                <span class="dot top-right"></span>
                <span class="dot bottom-left"></span>
                <span class="dot bottom-right"></span>
              </div>
              <!-- Face 2 (Top - 2 Dots) -->
              <div class="dice-face face-top" data-value="2">
                <span class="dot top-left"></span>
                <span class="dot bottom-right"></span>
              </div>
              <!-- Face 5 (Bottom - 5 Dots) -->
              <div class="dice-face face-bottom" data-value="5">
                <span class="dot top-left"></span>
                <span class="dot top-right"></span>
                <span class="dot middle"></span>
                <span class="dot bottom-left"></span>
                <span class="dot bottom-right"></span>
              </div>
            </div>
          </div>
          <div class="roll-result" id="p1-result-val">-</div>
        </article>

        <!-- Player 2 / CPU Card -->
        <article class="player-card" id="player2-card">
          <div class="player-info">
            <div class="player-name-wrapper">
              <span id="p2-name" class="player-name" contenteditable="true" spellcheck="false" title="Double click to edit">Player 2</span>
              <button class="edit-name-btn" aria-label="Edit Player 2 Name">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4z"></path>
                </svg>
              </button>
            </div>
            <div id="p2-score-bubble" class="score-bubble">0</div>
          </div>
          
          <!-- 3D Dice Stage -->
          <div class="dice-stage">
            <div class="dice-shadow" id="dice-shadow-2"></div>
            <div class="dice-cube" id="dice-cube-2">
              <!-- Face 1 (Front - 1 Dot) -->
              <div class="dice-face face-front" data-value="1">
                <span class="dot middle"></span>
              </div>
              <!-- Face 6 (Back - 6 Dots) -->
              <div class="dice-face face-back" data-value="6">
                <span class="dot top-left"></span>
                <span class="dot top-right"></span>
                <span class="dot middle-left"></span>
                <span class="dot middle-right"></span>
                <span class="dot bottom-left"></span>
                <span class="dot bottom-right"></span>
              </div>
              <!-- Face 3 (Right - 3 Dots) -->
              <div class="dice-face face-right" data-value="3">
                <span class="dot top-right"></span>
                <span class="dot middle"></span>
                <span class="dot bottom-left"></span>
              </div>
              <!-- Face 4 (Left - 4 Dots) -->
              <div class="dice-face face-left" data-value="4">
                <span class="dot top-left"></span>
                <span class="dot top-right"></span>
                <span class="dot bottom-left"></span>
                <span class="dot bottom-right"></span>
              </div>
              <!-- Face 2 (Top - 2 Dots) -->
              <div class="dice-face face-top" data-value="2">
                <span class="dot top-left"></span>
                <span class="dot bottom-right"></span>
              </div>
              <!-- Face 5 (Bottom - 5 Dots) -->
              <div class="dice-face face-bottom" data-value="5">
                <span class="dot top-left"></span>
                <span class="dot top-right"></span>
                <span class="dot middle"></span>
                <span class="dot bottom-left"></span>
                <span class="dot bottom-right"></span>
              </div>
            </div>
          </div>
          <div class="roll-result" id="p2-result-val">-</div>
        </article>

      </section>

      <!-- Center Action and Status Zone -->
      <section class="control-panel">
        <div id="status-banner" class="status-banner">
          Press roll to start the battle!
        </div>
        <button id="roll-btn" class="roll-btn" tabindex="0">
          <span class="btn-glow"></span>
          <span class="btn-text">ROLL DICE</span>
        </button>
      </section>

      <!-- Collapsible Roll History Log -->
      <section class="history-section">
        <button id="history-toggle" class="history-toggle">
          <span>Match History Log</span>
          <svg class="chevron-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div id="history-log" class="history-log hidden">
          <div class="empty-history">No rounds rolled yet. Start playing!</div>
        </div>
      </section>

    </main>
    
    <footer class="footer">
      <p>© 2026 Dice Royale. Crafted for an premium arcade experience. 🎲</p>
    </footer>
  </div>

  <!-- End Game Modal Winner Announcement -->
  <div id="winner-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-trophy">🏆</div>
      <h2 id="modal-winner-title">PLAYER 1 WINS!</h2>
      <p id="modal-winner-detail">First to reach 5 victories.</p>
      <button id="modal-restart-btn" class="modal-btn">PLAY AGAIN</button>
    </div>
  </div>

  <script src="assets/js/script.js" charset="utf-8"></script>
</body>
</html>
